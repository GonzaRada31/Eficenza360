name: Docker Build Validation

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: # Enable manual triggers

jobs:
  docker-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
        
    - name: Build API Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.api
        push: false
        tags: eficenza360-api:latest
        cache-from: type=registry,ref=eficenza360-api:buildcache
        cache-to: type=registry,ref=eficenza360-api:buildcache,mode=max
        
    - name: Build Web Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.web
        push: false
        tags: eficenza360-web:latest
        cache-from: type=registry,ref=eficenza360-web:buildcache
        cache-to: type=registry,ref=eficenza360-web:buildcache,mode=max
