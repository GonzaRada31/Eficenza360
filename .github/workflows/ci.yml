name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Enable Corepack
      run: corepack enable
        
    - name: Install dependencies
      run: npm ci
      
    - name: Generate Prisma Client
      run: cd apps/api && npx prisma generate

    - name: Lint codebase
      run: npm run lint
      
    - name: Typecheck
      run: npm run typecheck
      continue-on-error: true # adjust once all strict types are confirmed passing universally via CI
      
    - name: Run Tests (Not required for strict pass yet but good to have)
      run: |
        npm run test --if-present
        
    - name: Build Web
      run: npm run build --workspace=apps/client
      
    - name: Build API
      run: npm run build --workspace=apps/api
